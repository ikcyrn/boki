<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>支出サマリー</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="top-banner">
      </header>

      <main>
        <section class="panel summary-control-panel" aria-labelledby="summary-page-title">
          <div class="panel-heading">
            <div>
              <h1 id="summary-page-title">支出サマリー</h1>
              <p>期間を選んで支出を確認できます。</p>
            </div>
          </div>

          <div class="summary-section-body summary-controls">
            <label>
              <span>表示期間</span>
              <select id="period-select">
                <option value="this-month">今月</option>
                <option value="last-month">先月</option>
                <option value="last-7">過去7日</option>
                <option value="last-30">過去30日</option>
                <option value="custom">カスタム期間</option>
              </select>
            </label>

            <div class="range-grid" id="custom-range" hidden>
              <label>
                <span>開始日</span>
                <input id="start-date" type="date">
              </label>
              <label>
                <span>終了日</span>
                <input id="end-date" type="date">
              </label>
              <button class="primary-button" id="apply-range" type="button">期間で表示</button>
            </div>
          </div>
        </section>

        <section class="panel" aria-labelledby="summary-total-title">
          <div class="panel-heading">
            <div>
              <h2 id="summary-total-title">集計結果</h2>
              <p id="period-label">選択中の期間</p>
            </div>
          </div>

          <div class="summary-section-body">
            <div class="summary-total-box">
              <span>合計</span>
              <strong id="summary-total">¥0</strong>
              <small id="summary-count">0件</small>
            </div>

            <div class="summary-stat-grid">
              <div class="summary-stat">
                <span>1日平均</span>
                <strong id="daily-average">¥0</strong>
              </div>
              <div class="summary-stat">
                <span>最大支出日</span>
                <strong id="max-day">-</strong>
              </div>
            </div>

            <div class="category-list" id="category-list"></div>
          </div>
        </section>

        <section class="panel" aria-labelledby="calendar-title">
          <div class="panel-heading">
            <div>
              <h2 id="calendar-title">カレンダー</h2>
              <p>31日以内の期間のみ表示します。日付タップで明細を確認できます。</p>
            </div>
          </div>
          <div class="summary-section-body">
            <div class="calendar-grid" id="calendar-grid"></div>
          </div>
        </section>

        <section class="panel" aria-labelledby="summary-items-title">
          <div class="panel-heading">
            <div>
              <h2 id="summary-items-title">明細</h2>
              <p id="items-label">選択期間内の登録済み支出です。</p>
            </div>
          </div>
          <div class="summary-section-body">
            <button class="small-button day-filter-clear" id="clear-day-filter" type="button" hidden>期間全体に戻る</button>
            <div class="summary-item-list" id="summary-item-list"></div>
          </div>
        </section>
      </main>

      <nav class="footer-menu" aria-label="ページ内メニュー">
        <a href="index.html">読取</a>
        <a href="summary.html" aria-current="page">集計</a>
        <a href="donate.html">寄付</a>
      </nav>
    </div>

    <script defer src="summary.js"></script>
  </body>
</html>
