<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>レシート帳</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="top-banner">
      </header>

      <main>
        <section class="panel scan-panel" aria-labelledby="scan-title">
          <div class="panel-heading">
            <div>
              <h1 id="scan-title">レシートを読み取り</h1>
              <p>カメラで撮影、または画像を選択してください。</p>
            </div>
          </div>

          <label class="scan-button" for="receipt-image">
            <span>写真を撮る / 選ぶ</span>
            <small>JPEG・PNG対応</small>
          </label>
          <input id="receipt-image" type="file" accept="image/*" capture="environment">

          <button class="primary-button" id="read-button" type="button" disabled>読み取り開始</button>
          <p class="notice" id="scan-status">読み取り後、日付と金額を自動入力します。必要なら修正できます。</p>
        </section>

        <section class="panel form-panel" aria-labelledby="form-title">
          <div class="panel-heading">
            <div>
              <h2 id="form-title">支出登録</h2>
              <p>読み取り結果を確認して保存します。</p>
            </div>
          </div>

          <form id="expense-form">
            <label>
              <span>日付</span>
              <input id="expense-date" name="date" type="date" required>
            </label>
            <label>
              <span>店名</span>
              <input id="expense-store" name="store" type="text" placeholder="例: セブンイレブン 新宿店" required>
            </label>
            <label>
              <span>金額</span>
              <input id="expense-amount" name="amount" type="number" inputmode="numeric" min="1" step="1" placeholder="1280" required>
            </label>
            <label>
              <span>分類</span>
              <select id="expense-category" name="category">
                <option>食費</option>
                <option>日用品</option>
                <option>交通</option>
                <option>医療</option>
                <option>交際費</option>
                <option>仕事</option>
                <option>その他</option>
              </select>
            </label>
            <label>
              <span>読み取り文字</span>
              <textarea id="ocr-text" rows="5" placeholder="OCR結果やレシート本文を貼り付けると、日付・金額・店名を抽出します。"></textarea>
            </label>
            <div class="form-actions">
              <button class="primary-button" type="submit">登録する</button>
              <button class="small-button" id="clear-form" type="button">入力消去</button>
            </div>
          </form>
        </section>

        <section class="panel summary-panel" aria-labelledby="summary-title">
          <div class="panel-heading">
            <div>
              <h2 id="summary-title">日付別の支出</h2>
              <p>登録した支出を日付ごとに集計します。</p>
            </div>
          </div>
          <div class="total-line">
            <span>総合計</span>
            <strong id="grand-total">¥0</strong>
          </div>
          <div class="date-list" id="date-list"></div>
        </section>
      </main>

      <nav class="footer-menu" aria-label="ページ内メニュー">
        <a href="#scan-title">読取</a>
        <a href="#form-title">登録</a>
        <a href="#summary-title">一覧</a>
      </nav>
    </div>

    <template id="date-group-template">
      <article class="date-group">
        <button class="date-toggle" type="button">
          <span class="date-label"></span>
          <strong class="date-total"></strong>
        </button>
        <ul class="expense-list"></ul>
      </article>
    </template>

    <template id="expense-template">
      <li class="expense-item">
        <div>
          <strong class="expense-store"></strong>
          <span class="expense-category"></span>
        </div>
        <div class="expense-right">
          <span class="expense-amount"></span>
          <button class="delete-button" type="button" aria-label="削除">削除</button>
        </div>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
